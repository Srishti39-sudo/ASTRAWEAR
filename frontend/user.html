<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Avatar | AstraWear</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
  <script type="module">
    import { auth, onAuthStateChanged } from "./firebase-config.js";
    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "auth.html"; });
  </script>
    
 
<form id="userForm">

    <label>Gender</label>
    <select id="gender" required>
      <option value="">Select Gender</option>
      <option value="female">Female</option>
      <option value="male">Male</option>
    </select>
  
    <label>Aesthetic</label>
    <select id="aesthetic" required>
      <option value="">Select Aesthetic</option>
      <option value="baddie">Baddie</option>
      <option value="casual">Casual Girl/Boy</option>
      <option value="gym">Gym Freak</option>
      <option value="old fashion">Old Fashion</option>
      <option value="gothic">Gothic</option>
    </select>
  
    <label>Height (cm)</label>
    <input type="number" id="height" min="50" max="250" required />

    <label>Bust (cm)</label>
    <input type="number" id="bust" min="50" max="200" required />

    <label>Upper Waist (cm)</label>
    <input type="number" id="upperWaist" min="40" max="200" required />
    <label>Lower Waist (cm)</label>
    <input type="number" id="lowerWaist" min="40" max="200" required />
    <label>Hips (cm)</label>
    <input type="number" id="hips" min="50" max="200" required />
  
    <button type="submit" class="btn">Generate Avatar</button>
  
  </form>
  <script src="user.js"></script>

    
</body>
</html>
