<head>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    
 
<form id="userForm">

    <label>Gender</label>
    <select id="gender" required>
      <option value="">Select Gender</option>
      <option value="female">Female</option>
      <option value="male">Male</option>
    </select>
  
    <label>Aesthetic</label>
    <select id="aesthetic" required>
      <option value="">Select Aesthetic</option>
      <option value="baddie">Baddie</option>
      <option value="casual">Casual Girl/Boy</option>
      <option value="gym">Gym Freak</option>
      <option value="old fashion">Old Fashion</option>
      <option value="gothic">Gothic</option>
    </select>
  
    <label>Height (cm)</label>
    <input type="number" id="height" required />
  
    <label>Bust (cm)</label>
    <input type="number" id="bust" required />
  
    <label>upper Waist (cm)</label>
    <input type="number" id="upperWaist" required />
    <label >lower waist (cm)</label>
    <input type="number" id="lowerWaist" required />
    <label>Hips (cm)</label>
    <input type="number" id="hips" required />
  
    <button type="submit" class="btn">Generate Avatar</button>
  
  </form>
  <script src="user.js"></script>

    
</body>
